<!DOCTYPE html>
<html lang="ru">


<head>
    <meta charset="UTF-8">
    <title>Тестирование интерактивной карты</title>
    <style>
        /* =========================================
           БАЗОВЫЕ СТИЛИ СТРАНИЦЫ И КОНТЕЙНЕРА
        ========================================= */
        body {
            margin: 0;
            padding: 20px;
            background: #f4f6f9;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 22px;
            color: #1e293b;
            margin-bottom: 5px;
        }

        p {
            color: #64748b;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #map-container {
            width: 90vw;
            height: 80vh;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Настройки курсора для карты (Pan & Zoom) */
        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg:active {
            cursor: grabbing;
        }


        /* Кружки станций */

        /* Default */
        [id^="st-"] {
            cursor: pointer;
            transition: transform 0.2s ease, fill 0.2s ease, stroke 0.2s ease;
            transform-box: fill-box;
            transform-origin: center;
            
            
        }

        /* Hover */
        [id^="st-"].is-hovered {
            transform: scale(1.2);
        }

        /* Active */
        [id^="st-"].is-active {
            fill: #FF3B3B !important;
            stroke: #ffffff !important;
            /* Появляется белая обводка */
        }


        /* Названия станций */

        /* Default */
        [id^="text-"] {
            cursor: pointer;
            transition: fill 0.2s ease;
            fill: #1e293b;
            stroke: #ffffff;
            stroke-width: 4px;
            stroke-linejoin: round;
            paint-order: stroke fill;
        }

        /* Hover */
        [id^="text-"].is-hovered,
        [id^="text-"].is-hovered path {
            fill: #FF3B3B !important;
        }

        /* Active */
        [id^="text-"].is-active,
        [id^="text-"].is-active path {
            fill: #FF3B3B !important;
            stroke: #ffffff !important;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

</head>

<body>

    <h1>Проверка интерактивности схемы</h1>
    <p>Загрузка внешнего файла + Pan & Zoom</p>

    <div id="map-container">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('map-container');

            // Файл с картой
            fetch('test.svg')
                .then(response => response.text())
                .then(svgCode => {
                    container.innerHTML = svgCode;

                    // Зум и перемещение
                    const svgElement = container.querySelector('svg');
                    if (svgElement) {
                        svgPanZoom(svgElement, {
                            zoomEnabled: true,
                            controlIconsEnabled: true,
                            fit: true,
                            center: true,
                            minZoom: 0.5,
                            maxZoom: 10,
                            zoomScaleSensitivity: 0.2,
                            dblClickZoomEnabled: false
                        });
                    }
                })
                .catch(error => console.error('Ошибка загрузки SVG:', error));

            // Логика кликов 
            function toggleStation(baseName) {
                const circles = document.querySelectorAll(`[id^="st-${baseName}"]`);
                const text = document.getElementById(`text-${baseName}`);

                circles.forEach(c => c.classList.toggle('is-active'));
                if (text) text.classList.toggle('is-active');
            }

            container.addEventListener('click', (e) => {
                const target = e.target.closest('[id^="st-"], [id^="text-"]');
                if (!target) return;

                const cleanId = target.id.replace('st-', '').replace('text-', '').replace(/-\d+$/, '');
                toggleStation(cleanId);
            });

            // Единая логика наведения (для текста и кружков)
            container.addEventListener('mouseover', (e) => {
                const target = e.target.closest('[id^="text-"], [id^="st-"]');
                if (!target) return;

                // Достаем чистый корень названия
                const cleanId = target.id.replace('st-', '').replace('text-', '').replace(/-\d+$/, '');

                // Магия здесь: ищем ВСЕ элементы (и кружки, и текст), в которых есть этот корень
                const relatedElements = document.querySelectorAll(`[id^="st-${cleanId}"], [id^="text-${cleanId}"]`);

                // Вешаем класс ховера на всё найденное
                relatedElements.forEach(el => el.classList.add('is-hovered'));
            });

            // Логика когда мышка уходит
            container.addEventListener('mouseout', (e) => {
                const target = e.target.closest('[id^="text-"], [id^="st-"]');
                if (!target) return;

                const cleanId = target.id.replace('st-', '').replace('text-', '').replace(/-\d+$/, '');

                const relatedElements = document.querySelectorAll(`[id^="st-${cleanId}"], [id^="text-${cleanId}"]`);

                // Снимаем класс со всего найденного
                relatedElements.forEach(el => el.classList.remove('is-hovered'));
            });
        });

    </script>
</body>

</html>
