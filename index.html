<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Тестирование интерактивной карты</title>
    <style>
        /* Страница */

        body {
            margin: 0;
            padding: 20px;
            background: #f4f6f9;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 22px;
            color: #1e293b;
            margin-bottom: 5px;
        }

        p {
            color: #64748b;
            margin-top: 0;
            margin-bottom: 20px;
        }

        #map-container {
            width: 90vw;
            height: 80vh;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Настройки курсора для карты */
        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        svg:active {
            cursor: grabbing;
        }


        /* Кружки станций */

        /* Default */
        [id^="st-"] {
            cursor: pointer;
            transition: transform 0.2s ease, fill 0.2s ease, stroke 0.2s ease;
            transform-box: fill-box;
            transform-origin: center;
        }

        /* Hover */
        [id^="st-"].is-hovered {
            transform: scale(1.2);
        }

        /* Active */
        [id^="st-"].is-active {
            fill: #008000 !important;
            stroke: #ffffff !important;
            stroke-width: 4px !important;
        }


        /* Названия станций */

        /* Default */
        [id^="text-"] {
            cursor: pointer;
            transition: fill 0.2s ease;
            fill: #9b9b9b;
            stroke: #ffffff;
            stroke-width: 4px;
            stroke-linejoin: round;
            paint-order: stroke fill;
        }

        /* Hover */
        [id^="text-"].is-hovered,
        [id^="text-"].is-hovered path {
            fill: #252525 !important;
        }

        /* Active */
        [id^="text-"].is-active,
        [id^="text-"].is-active path {
            fill: #008000 !important;
            stroke: #ffffff !important;
        }

        /* =========================================
           НОВЫЕ СТИЛИ ДЛЯ ПОПАПА И КНОПОК
        ========================================= */
        #open-map-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #4A53FF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;

            /* Скрыто по умолчанию */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        #modal-overlay.is-open {
            opacity: 1;
            visibility: visible;
        }

        #close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: #f1f5f9;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>

</head>

<body>

    <h1>Проверка интерактивности схемы</h1>
    <p>Загрузка внешнего файла + Pan & Zoom</p>

    <button id="open-map-btn">Открыть карту</button>

    <div id="modal-overlay">
        <div id="map-container">
            <button id="close-modal-btn">✕</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('map-container');
            let mapZoomInstance; // Сохраняем инстанс, чтобы потом пересчитать размер

            // Файл с картой
            fetch('maptext.svg')
                .then(response => response.text())
                .then(svgCode => {
                    // Вставляем SVG так, чтобы не затереть кнопку закрытия
                    container.insertAdjacentHTML('beforeend', svgCode);

                    // Зум и перемещение
                    const svgElement = container.querySelector('svg');
                    if (svgElement) {
                        mapZoomInstance = svgPanZoom(svgElement, {
                            zoomEnabled: true,
                            controlIconsEnabled: true,
                            fit: true,
                            center: true,
                            minZoom: 0.5,
                            maxZoom: 10,
                            zoomScaleSensitivity: 0.2,
                            dblClickZoomEnabled: false
                        });
                    }
                })
                .catch(error => console.error('Ошибка загрузки SVG:', error));

            // ==========================================
            // НОВАЯ ЛОГИКА ДЛЯ ПОПАПА
            // ==========================================
            const modal = document.getElementById('modal-overlay');
            const openBtn = document.getElementById('open-map-btn');
            const closeBtn = document.getElementById('close-modal-btn');

            openBtn.addEventListener('click', () => {
                modal.classList.add('is-open');

                // Пересчитываем размеры карты, так как она была скрыта
                if (mapZoomInstance) {
                    setTimeout(() => {
                        mapZoomInstance.resize();
                        mapZoomInstance.fit();
                        mapZoomInstance.center();
                    }, 50);
                }
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('is-open');
            });

            // Закрытие по клику на темный фон
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('is-open');
                }
            });

            // ==========================================
            // ТВОЯ ЛОГИКА КЛИКОВ И ХОВЕРОВ
            // ==========================================
            function toggleStation(baseName) {
                const circles = document.querySelectorAll(`[id^="st-${baseName}"]`);
                const text = document.getElementById(`text-${baseName}`);

                circles.forEach(c => c.classList.toggle('is-active'));
                if (text) text.classList.toggle('is-active');
            }

            container.addEventListener('click', (e) => {
                const target = e.target.closest('[id^="st-"], [id^="text-"]');
                if (!target) return;

                const cleanId = target.id.replace('st-', '').replace('text-', '').replace(/-\d+$/, '');
                toggleStation(cleanId);
            });

            container.addEventListener('mouseover', (e) => {
                const target = e.target.closest('[id^="text-"], [id^="st-"]');
                if (!target) return;

                const cleanId = target.id.replace('st-', '').replace('text-', '').replace(/-\d+$/, '');
                const relatedElements = document.querySelectorAll(`[id^="st-${cleanId}"], [id^="text-${cleanId}"]`);

                relatedElements.forEach(el => el.classList.add('is-hovered'));
            });

            container.addEventListener('mouseout', (e) => {
                const target = e.target.closest('[id^="text-"], [id^="st-"]');
                if (!target) return;

                const cleanId = target.id.replace('st-', '').replace('text-', '').replace(/-\d+$/, '');
                const relatedElements = document.querySelectorAll(`[id^="st-${cleanId}"], [id^="text-${cleanId}"]`);

                relatedElements.forEach(el => el.classList.remove('is-hovered'));
            });
        });

    </script>
</body>

</html>
